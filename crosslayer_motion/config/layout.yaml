# Layout for the motion / interactive demo: WHERE each colored area is and how
# big the obstacle box is. The plan/instruction only names areas; this file
# gives them a place + a color. Read at runtime (pass via -p layout:=), so you
# can edit numbers and re-run WITHOUT rebuilding.
#
# Coordinates are in the panda_link0 (base) frame, metres. These are calibrated
# starting values for the "left / center / right" obstacle-avoidance demo; tune
# them to your scene (if MoveIt cannot reach a pose, pull it in / raise z).
# color is RGB 0..1 (used for RViz markers and optional Gazebo tiles).

ee_orientation_xyzw: [0.0, 1.0, 0.0, 0.0]   # gripper pointing down

regions:
  scan_pose:   {x: 0.45, y:  0.25, z: 0.40, color: [0.6, 0.6, 0.6]}   # start (left)
  white_area:  {x: 0.45, y:  0.00, z: 0.40, color: [1.0, 1.0, 1.0]}   # center
  red_area:    {x: 0.45, y: -0.25, z: 0.40, color: [1.0, 0.0, 0.0]}   # right
  yellow_area: {x: 0.45, y:  0.40, z: 0.40, color: [1.0, 1.0, 0.0]}
  blue_area:   {x: 0.20, y:  0.40, z: 0.40, color: [0.0, 0.3, 1.0]}

obstacle:
  default_size: [0.10, 0.10, 0.50]   # box lx, ly, lz (m); tall enough to block the EE path
  z_base: 0.0                        # table top the box sits on (calibrate to the scene)

planning:
  max_velocity: 0.1
  max_acceleration: 0.1
